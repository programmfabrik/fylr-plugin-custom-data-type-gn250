plugin:
  name: custom-data-type-gn250
  version: 1.5
  url: https://github.com/programmfabrik/fylr-plugin-custom-data-type-gn250
  displayname:
    de-DE: gn250-Verknüpfung
    en-US: gn250-Referencing
  info:
    de-DE: |
      Stellt einen eigenen Feldtyp bereit, mit dem Datensätze mit Einträgen des GN250-Datenbestands des Bundesamts für Kartographie und Geodäsie (BKG) verknüpft werden. Redakteure suchen einen Eintrag und hinterlegen eine eindeutige Referenz; der gewählte Ort lässt sich auf einer Karte anzeigen.

      - Vorschläge während der Eingabe über den GBV-Suggest-Dienst
      - Optionale Kartendarstellung des gewählten Orts über Mapbox
    en-US: |
      Adds a custom data type for linking records to entries in the GN250 dataset of the German Federal Agency for Cartography and Geodesy (BKG). Editors search for an entry and store an authoritative reference, and the selected location can be shown on a map.

      - Type-ahead search via the GBV suggest service
      - Optional map display of the selected place via Mapbox
  server:
    api-version:
      require: 1
  l10n: l10n/customDataTypeGN250.csv
  webfrontend:
    url: customDataTypeGN250.js
    css: customDataTypeGN250.css
    dependencies:
      - commons-library

base_url_prefix: "webfrontend"
custom_types:
  gn250:
    mapping:
      conceptName:
        type: text
      conceptURI:
        type: text
        skipTerms: true
      conceptAncestors:
        type: text
        skipTerms: true
      conceptGeoJSON:
        type: geo_json
        skipTerms: true
      facetTerm:
        type: text_l10n
        skipTerms: true
    config:
      mask:
        - name: editor_display
          parameters:
            value:
              type: select
              options: ["default", "condensed"]
    update:
      plugin_user:
        reference: system:root
      exec:
        service: "node"
        commands:
          - prog: "node"
            stdin:
              type: body
            stdout:
              type: body
            args:
              - type: "value"
                value: "%_exec.pluginDir%/updater/gn250Updater.js"
              - type: "value"
                value: "%info.json%"
      timeout: 60
      batch_size: 1
      expires_days: 1

base_config:
  - name: update_gn250
    group: update_custom_data_type
    parameters:
      restrict_time:
        type: bool
        default: false
        position: 0
      from_time:
        type: int
        default: 19
        min: 0
        max: 24
        position: 1
      to_time:
        type: int
        default: 4
        min: 0
        max: 24
        position: 2
      default_language:
        type: text
        default: 'de'
        position: 3
      custom_expires_days:
        type: int
        min: 1
        default: 1
        position: 4
  - name: mapbox_gn250
    group: mapbox_update_custom_data_type
    parameters:
      mapbox_api_key:
        type: text
        position: 0
